
[functions.monia-chat]
enabled = true
verify_jwt = false
import_map = "./functions/monia-chat/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/monia-chat/index.ts"
